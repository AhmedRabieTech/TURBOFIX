<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TurboFix - Premium Car Maintenance</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --primary-accent: #ff6b1a; /* Vibrant Sunset Orange */
        --secondary-accent: #ff8c42;
        --dark-bg: #0f1113; /* Deep Slate Black */
        --card-bg: #1a1d1f; /* Darker Card Background */
        --text-light: #e0e0e0;
        --text-muted: #9ba1a6;
      }
      body {
        background-color: var(--dark-bg);
        color: var(--text-light);
        transition: background-color 0.3s ease;
      }
      .bg-dark { background-color: #000000 !important; }
      .bg-primary { background-color: var(--primary-accent) !important; }
      .text-primary { color: var(--primary-accent) !important; }
      .btn-primary { 
        background-color: var(--primary-accent) !important; 
        border-color: var(--primary-accent) !important; 
        color: #fff !important;
      }
      .btn-primary:hover {
        background-color: var(--secondary-accent) !important;
      }
      .transition-all { transition: all 0.3s ease; }
      .text-gradient {
        background: linear-gradient(135deg, var(--primary-accent) 0%, var(--secondary-accent) 100%);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .card {
        background-color: var(--card-bg) !important;
        color: var(--text-light) !important;
        border: 1px solid rgba(255, 255, 255, 0.05) !important;
      }
      .text-muted { color: var(--text-muted) !important; }
      .bg-light { background-color: #121417 !important; }
      .navbar-dark .navbar-nav .nav-link { color: rgba(255, 255, 255, 0.8) !important; }
      .navbar-dark .navbar-nav .nav-link.active { color: var(--primary-accent) !important; }
      
      .hover-primary:hover { color: var(--primary-accent) !important; }
      .min-vh-500 { min-height: 500px; }
      .focus-none:focus { box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
